#logging
logging.pattern.console=%clr(%d{MM-dd-yy | HH:mm:ss.SSS}){blue} %clr(%-5p) %clr(%logger{0}){blue} %clr(%m){faint}%n
logging.level.org.apache.http.NoHttpResponseException=OFF
logging.level.java.net.SocketTimeoutException=OFF
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.java.net.HttpURLConnection=DEBUG
logging.level.org.springframework.security=ERROR
spring.application.name=user-service

#tomcat
server.shutdown=graceful
server.compression.enabled=true
server.tomcat.max-connections=8192
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20s
server.tomcat.keep-alive-timeout=20s
server.tomcat.max-keep-alive-requests=100
server.tomcat.accesslog.enabled=false

#http
server.http2.enabled=true
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB
server.compression.min-response-size=2KB
spring.webflux.multipart.max-disk-usage-per-part=52428800
spring.webflux.multipart.max-headers-size=52428800
spring.webflux.multipart.max-in-memory-size=10485760
spring.webflux.multipart.max-size=52428800

#datasource
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/master.yaml
spring.liquibase.drop-first=false
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=users_schema

#metrics
management.metrics.tags.application=${spring.application.name}
management.endpoints.web.exposure.include=health,info,metrics,httptrace,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

#security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SECURITY_SERVER_URL}
security.enabled=false
jwt.secret=${JWT_SECRET}
jwt.access-exp-ms=900000

#minio
minio.url=
minio.login=
minio.password=
minio.region=
minio.img.bucket.name=

#redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

#app
user.max-top-user-iteration-size=${MAX_TOP_USER_ITERATION_SIZE}
cache.feed-ttl=${FEED_TTL}

#kafka
kafka.bootstrap-server=
kafka.consumer.group-id=
kafka.consumer.auto-offset-reset=
kafka.consumer.key-deserializer=
kafka.consumer.value-deserializer=
kafka.producer.key-serializer=
kafka.producer.value-serializer=

#---
spring.config.activate.on-profile=prod
server.port=
#---
spring.config.activate.on-profile=dev
server.port=8098
server.tomcat.accesslog.enabled=true
#services
web.mediaBaseUrl=${MEDIA_SERVICE_BASE_URL}
web.postBaseUrl=${POST_SERVICE_BASE_URL}
web.notificationBaseUrl=${NOTIFICATION_SERVICE_BASE_URL}
web.ui-base-url=${UI_BASE_URL}
default.avatar.key=${DEFAULT_AVATAR_KEY}
kafka.bootstrap-server=${KAFKA_BOOTSTRAP_SERVER}
kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET}
kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER}
kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER}
kafka.producer.key-serializer=${KAFKA_PRODUCER_KEY_SERIALIZER}
kafka.producer.value-serializer=${KAFKA_PRODUCER_VALUE_SERIALIZER}
minio.url=${MINIO_URL}
minio.login=${MINIO_LOGIN}
minio.password=${MINIO_PASSWORD}
minio.region=${MINIO_REGION}
minio.img.bucket-name=${MINIO_IMG_BUCKET_NAME}